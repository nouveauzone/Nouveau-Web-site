name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # ✅ Install AWS CLI (IMPORTANT FIX)
    - name: Install AWS CLI
      run: |
        sudo apt-get update
        sudo apt-get install -y awscli

    # 🔵 Build Frontend
    - name: Install & Build Frontend
      run: |
        cd frontend
        npm install
        CI=false npm run build
      env:
        REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

    # 🔵 Deploy to S3
    - name: Deploy to S3
      run: |
        aws s3 sync frontend/build s3://${{ secrets.S3_BUCKET_NAME }} --delete \
          --exclude "index.html" \
          --cache-control "public,max-age=31536000,immutable"

        aws s3 cp frontend/build/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
          --cache-control "no-cache,no-store,must-revalidate" \
          --content-type "text/html"
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

    # 🔥 FORCE DEBUG (VERY IMPORTANT)
    - name: Debug CloudFront ID
      run: echo "Distribution ID = ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"

    # 🔥 CloudFront Invalidation (FINAL FIX)
    - name: Invalidate CloudFront Cache
      run: |
        aws cloudfront create-invalidation \
          --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
          --paths "/*"
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

    # 🟢 Deploy Backend
    - name: Deploy Backend to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/Nouveau-Web-site
          git pull origin main
          cd backend
          npm install
          pm2 restart backend || pm2 start server.js --name backend

    - name: Done
      run: echo "🚀 Deployment Successful"
