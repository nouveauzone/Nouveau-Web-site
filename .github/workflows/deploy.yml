name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # ✅ Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 🔵 Build frontend
    - name: Install & Build Frontend
      run: |
        cd frontend
        npm install
        CI=false npm run build
      env:
        REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

    # 🔍 Verify build
    - name: Check build output
      run: ls -la frontend/build

    # 🔵 Deploy frontend to S3
    - name: Deploy to S3
      run: |
        aws s3 sync frontend/build s3://nouveau-1099 --delete --exclude "index.html" --cache-control "public,max-age=31536000,immutable"
        aws s3 cp frontend/build/index.html s3://nouveau-1099/index.html --cache-control "no-cache,no-store,must-revalidate" --content-type "text/html"
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ap-south-1

    # 🔵 Invalidate CloudFront
    - name: Invalidate CloudFront
      run: |
        if [ -n "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
        else
          echo "CLOUDFRONT_DISTRIBUTION_ID not set; skipping invalidation"
        fi
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ap-south-1

    # 🟢 Deploy backend to EC2 (PERMANENT FIX)
    - name: Deploy Backend to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "🚀 Starting Backend Deployment..."

          cd /home/ubuntu/Nouveau-Web-site

          # Pull latest code
          git pull origin main

          cd backend

          # Install dependencies
          npm install

          # 🔥 HARD RESET (only once per deploy)
          pm2 kill || true
          sudo fuser -k 5000/tcp || true

          # 🔥 START WITH ECOSYSTEM (NO DUPLICATES EVER)
          pm2 start ecosystem.config.js

          # Save PM2 process
          pm2 save

          echo "✅ Backend Deployed Successfully"

    # ✅ Done
    - name: Deployment Complete
      run: echo "🚀 Deployment Successful"
