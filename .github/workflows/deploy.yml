name: Deploy to EC2

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🚀 Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 15m

          script: |
            set -e

            echo "🚀 Starting Deployment..."

            # 📁 Go to project folder
            cd /home/ubuntu/Nouveau-Web-site || exit 1

            # 🔧 Fix permissions
            sudo chown -R ubuntu:ubuntu /home/ubuntu/Nouveau-Web-site

            # 🔐 Fix git safe directory
            git config --global --add safe.directory /home/ubuntu/Nouveau-Web-site

            # 🔄 Pull latest code
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            # =========================
            # 📦 BACKEND SETUP
            # =========================
            cd backend
            export NODE_ENV=production

            npm install

            pm2 describe backend > /dev/null \
              && pm2 restart backend \
              || pm2 start server.js --name backend

            pm2 save

            # 🔍 Backend health check
            echo "🔍 Checking backend..."
            if ! curl --max-time 10 -fsS http://127.0.0.1:5000/api/health > /dev/null; then
              echo "❌ Backend failed"
              pm2 logs backend --lines 50 --nostream || true
              exit 1
            fi

            # =========================
            # 🎨 FRONTEND BUILD
            # =========================
            cd ../frontend

            npm install
            npm run build

            if [ ! -f build/index.html ]; then
              echo "❌ Frontend build failed"
              exit 1
            fi

            # =========================
            # 🌐 DEPLOY TO NGINX
            # =========================
            sudo mkdir -p /var/www/html
            sudo rsync -a --delete build/ /var/www/html/

            # =========================
            # 🔄 RELOAD NGINX
            # =========================
            if ! sudo nginx -t; then
              echo "❌ Nginx config error"
              sudo journalctl -u nginx -n 50 --no-pager
              exit 1
            fi

            sudo systemctl reload nginx

            # =========================
            # 🔍 FINAL CHECK
            # =========================
            echo "🌐 Checking live site..."
            sleep 5

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://nouveauz.com || echo "000")

            if [[ ! "$STATUS" =~ ^(2|3) ]]; then
              echo "❌ Site down (HTTP $STATUS)"
              exit 1
            fi

            echo "✅ Deployment Successful!"
