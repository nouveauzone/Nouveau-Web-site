name: Deploy to EC2

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v3

  - name: Setup SSH
    run: |
      echo "${{ secrets.EC2_KEY }}" > key.pem
      chmod 600 key.pem

  - name: Deploy to EC2
    run: |
      ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
        
        cd /home/ubuntu/Nouveau-Web-site-main

        # Pull latest code
        git pull origin main

        # ===== BACKEND =====
        cd backend
        npm install
        pm2 restart all || pm2 start server.js --name backend

        # ===== FRONTEND =====
        cd ../frontend
        npm install
        npm run build

        # ===== NGINX =====
        sudo systemctl restart nginx

      EOF
```
