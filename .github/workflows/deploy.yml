name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # ✅ Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 🔵 Build Frontend
    - name: Install & Build Frontend
      run: |
        cd frontend
        npm install
        CI=false npm run build
      env:
        REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

    # 🔍 Debug build (optional)
    - name: Check build output
      run: ls -la frontend/build

    # 🔵 Deploy to S3 (FIXED CACHE ISSUE)
    - name: Deploy to S3
      run: |
        aws s3 sync frontend/build s3://nouveau-1099 --delete

        # index.html should NEVER be cached
        aws s3 cp frontend/build/index.html s3://nouveau-1099/index.html \
        --cache-control "no-cache,no-store,must-revalidate" \
        --content-type "text/html"
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ap-south-1

    # 🔥 Invalidate CloudFront (VERY IMPORTANT)
    - name: Invalidate CloudFront Cache
      run: |
        aws cloudfront create-invalidation \
        --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
        --paths "/*"
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ap-south-1

    # 🟢 Deploy Backend to EC2 (PM2 FIXED)
    - name: Deploy Backend to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/Nouveau-Web-site

          # Pull latest code
          git pull origin main

          cd backend
          npm install

          # Kill port 5000 (fix EADDRINUSE permanently)
          sudo fuser -k 5000/tcp || true

          # Stop old PM2 processes safely
          pm2 delete backend || true

          # Start fresh instance
          pm2 start server.js --name backend

          # Save PM2 state
          pm2 save

    # ✅ Done
    - name: Deployment Complete
      run: echo "🚀 Deployment Successful"
