name: Deploy to EC2

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > key.pem
          chmod 600 key.pem

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'

            set -e

            echo "🚀 Starting Deployment..."

            cd /home/ubuntu/Nouveau-Web-site || exit 1

            # Sync repo
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            # Fix permissions
            sudo chown -R ubuntu:ubuntu /home/ubuntu/Nouveau-Web-site

            # =========================
            # 📦 BACKEND
            # =========================
            cd backend
            npm install --production

            # IMPORTANT: no delete, only restart
            pm2 restart backend || pm2 start server.js --name backend
            pm2 save

            # Quick backend smoke check
            if ! curl --max-time 12 -fsS http://127.0.0.1:5000/api/health > /dev/null; then
              echo "⚠️ Backend health check failed, continuing frontend deploy"
              pm2 status || true
              pm2 logs backend --lines 120 --nostream || true
            fi

            # =========================
            # 🎨 FRONTEND
            # =========================
            cd ../frontend
            npm install
            npm run build

            if [ ! -f build/index.html ]; then
              echo "❌ Frontend build missing build/index.html"
              exit 1
            fi

            # =========================
            # 🔄 NGINX
            # =========================
            echo "📁 Updating Nginx files..."

            sudo mkdir -p /var/www/html
            sudo rm -rf /var/www/html/*
            sudo cp -r build/. /var/www/html/

            # =========================
            # 🔄 RESTART NGINX
            # =========================
            echo "🔄 Restarting Nginx..."
            sudo systemctl restart nginx

            # Nginx + site smoke checks to catch hidden 500s
            if ! sudo nginx -t; then
              echo "❌ nginx config test failed"
              sudo journalctl -u nginx -n 120 --no-pager || true
              exit 1
            fi

            SITE_CODE=$(curl --max-time 12 -sS -o /tmp/nouveau-site-check.html -w "%{http_code}" -H "Host: nouveauz.com" http://127.0.0.1/ || echo "000")
            if [[ ! "$SITE_CODE" =~ ^(2|3) ]]; then
              echo "❌ Nginx localhost site check failed with HTTP $SITE_CODE"
              sudo systemctl status nginx --no-pager || true
              sudo journalctl -u nginx -n 120 --no-pager || true
              tail -n 60 /tmp/nouveau-site-check.html || true
              exit 1
            fi

            # Public domain check with short retries to catch transient startup issues
            PUBLIC_CODE="000"
            for i in {1..8}; do
              PUBLIC_CODE=$(curl --max-time 12 -sS -o /tmp/nouveau-public-check.html -w "%{http_code}" https://nouveauz.com/ || echo "000")
              if [[ "$PUBLIC_CODE" =~ ^(2|3) ]]; then
                break
              fi
              echo "⚠️ Public check attempt $i failed with HTTP $PUBLIC_CODE"
              sleep 4
            done

            if [[ ! "$PUBLIC_CODE" =~ ^(2|3) ]]; then
              echo "❌ Public domain check failed with HTTP $PUBLIC_CODE"
              sudo systemctl status nginx --no-pager || true
              sudo journalctl -u nginx -n 120 --no-pager || true
              tail -n 60 /tmp/nouveau-public-check.html || true
              exit 1
            fi

            echo "✅ Deployment Complete!"

          EOF
