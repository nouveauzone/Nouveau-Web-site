name: Deploy to EC2

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > key.pem
          chmod 600 key.pem

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'

            echo "🚀 Starting Deployment..."

            cd /home/ubuntu/Nouveau-Web-site || exit 1

            # 🔥 CLEAN + SYNC REPO
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            # =========================
            # 🔥 FIX PERMISSIONS (VERY IMPORTANT)
            # =========================
            echo "🔐 Fixing permissions..."
            sudo chown -R ubuntu:ubuntu /home/ubuntu/Nouveau-Web-site

            # =========================
            # 📦 BACKEND SETUP
            # =========================
            echo "📦 Backend Setup..."
            cd backend

            npm install --production

            # Restart backend
            pm2 delete backend || true
            pm2 start server.js --name backend

            # =========================
            # 🎨 FRONTEND BUILD
            # =========================
            echo "🎨 Frontend Build..."
            cd ../frontend

            # Remove old build safely
            rm -rf build

            npm install
            npm run build

            # =========================
            # 🚀 DEPLOY BUILD TO NGINX
            # =========================
            echo "📁 Updating Nginx files..."

            sudo rm -rf /var/www/html/*
            sudo cp -r build/* /var/www/html/

            # =========================
            # 🔄 RESTART NGINX
            # =========================
            echo "🔄 Restarting Nginx..."
            sudo systemctl restart nginx
            sudo systemctl reload nginx

            echo "✅ Deployment Complete!"

          EOF
