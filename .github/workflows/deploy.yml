name: Deploy to EC2

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 15m

          script: |
            set -e

            echo "🚀 Starting Deployment..."

            cd /home/ubuntu/Nouveau-Web-site || exit 1

            # 🔧 FIX PERMISSIONS
            sudo chown -R ubuntu:ubuntu /home/ubuntu/Nouveau-Web-site

            # 🔐 FIX GIT SAFE DIRECTORY
            git config --global --add safe.directory /home/ubuntu/Nouveau-Web-site

            # 🔄 SYNC CODE
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            # 📦 BACKEND
            cd backend
            export NODE_ENV=production

            npm install

            pm2 describe backend > /dev/null \
              && pm2 restart backend \
              || pm2 start server.js --name backend

            pm2 save

            # 🔍 BACKEND HEALTH CHECK
            echo "🔍 Checking backend..."
            if ! curl --max-time 10 -fsS http://127.0.0.1:5000/api/health > /dev/null; then
              echo "❌ Backend health failed"
              pm2 logs backend --lines 50 --nostream || true
              exit 1
            fi

            # 🎨 FRONTEND
            cd ../frontend
            npm install
            npm run build

            if [ ! -f build/index.html ]; then
              echo "❌ Frontend build failed"
              exit 1
            fi

            # 🌐 NGINX DEPLOY
            sudo mkdir -p /var/www/html
            sudo rsync -a --delete build/ /var/www/html/

            # 🔄 NGINX RELOAD
            if ! sudo nginx -t; then
              echo "❌ Nginx config error"
              sudo journalctl -u nginx -n 50 --no-pager
              exit 1
            fi

            sudo systemctl reload nginx

            # 🔍 FINAL CHECK
            echo "🌐 Checking live site..."
            sleep 5

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://nouveauz.com || echo "000")

            if [[ ! "$STATUS" =~ ^(2|3) ]]; then
              echo "❌ Site down after deploy (HTTP $STATUS)"
              exit 1
            fi

            echo "✅ Deployment Successful!"
