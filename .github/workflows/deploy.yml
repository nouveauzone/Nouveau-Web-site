name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # ✅ Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 🔵 Install & Build Frontend
    - name: Install & Build Frontend
      run: |
        cd frontend
        npm install
        CI=false npm run build
      env:
        REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

    # 🔍 Verify build output
    - name: Check build output
      run: ls -la frontend/build

    # 🔵 Deploy to S3 (with proper caching)
    - name: Deploy to S3
      run: |
        aws s3 sync frontend/build s3://nouveau-1099 --delete \
          --exclude "index.html" \
          --cache-control "public,max-age=31536000,immutable"

        aws s3 cp frontend/build/index.html s3://nouveau-1099/index.html \
          --cache-control "no-cache,no-store,must-revalidate" \
          --content-type "text/html"
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ap-south-1

    # 🔥 CloudFront Cache Invalidation (FIXED)
    - name: Invalidate CloudFront
      run: |
        aws cloudfront create-invalidation \
          --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
          --paths "/*"
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ap-south-1

    # 🟢 Deploy Backend to EC2
    - name: Deploy Backend to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/Nouveau-Web-site
          git pull origin main
          cd backend
          npm install
          pm2 restart backend || pm2 start server.js --name backend

    # ✅ Done
    - name: Deployment Complete
      run: echo "🚀 Deployment Successful"
