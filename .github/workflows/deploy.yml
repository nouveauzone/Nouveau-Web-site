name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: 📦 Install dependencies
        working-directory: ./frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund || npm install --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: 🎨 Build frontend
        working-directory: ./frontend
        run: |
          export CI=false
          npm run build

      - name: 📤 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 1

  deploy:
    name: Deploy to EC2
    needs: build-frontend
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 📥 Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build

      - name: 🚀 Transfer Build to EC2 (rsync)
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ubuntu
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts
          rsync -avz --delete frontend/build/ $USER@$HOST:/home/ubuntu/frontend-build/

      - name: 🚀 Deploy Backend & Sync Nginx via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m

          script: |
            set -euo pipefail

            echo "🚀 Starting Deployment..."

            export HOME="/home/ubuntu"
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
              nvm use --lts >/dev/null 2>&1 || true
            fi

            APP_DIR="/home/ubuntu/Nouveau-Web-site"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "📦 Project directory missing, cloning fresh copy..."
              rm -rf "$APP_DIR"
              git clone --depth 1 https://github.com/nouveauzone/Nouveau-Web-site.git "$APP_DIR"
            fi

            # 📁 Go to project folder
            cd "$APP_DIR" || exit 1

            # 🔧 Fix permissions
            sudo chown -R ubuntu:ubuntu "$APP_DIR"

            # 🔐 Fix git safe directory
            git config --global --add safe.directory "$APP_DIR"

            # 🔄 Pull latest code
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            # =========================
            # 📦 BACKEND SETUP
            # =========================
            cd backend
            export NODE_ENV=production

            if [ -f package-lock.json ]; then
              npm ci --omit=dev --no-audit --no-fund || npm install --no-audit --no-fund
            else
              npm install --no-audit --no-fund
            fi

            pm2 describe backend > /dev/null \
              && pm2 restart backend \
              || pm2 start server.js --name backend

            pm2 save

            # =========================
            # 🌐 DEPLOY TO NGINX
            # =========================
            if ! command -v rsync >/dev/null 2>&1; then
              echo "📦 rsync missing, installing..."
              sudo apt-get update -y
              sudo apt-get install -y rsync
            fi

            # Using the pre-built files we rsynced from Github Actions
            sudo mkdir -p /var/www/html
            sudo rsync -a --delete /home/ubuntu/frontend-build/ /var/www/html/

            # =========================
            # 🔄 RELOAD NGINX
            # =========================
            if ! sudo nginx -t; then
              echo "❌ Nginx config error"
              sudo journalctl -u nginx -n 50 --no-pager
              exit 1
            fi

            sudo systemctl reload nginx

            # =========================
            # 🔍 BACKEND HEALTH & FINAL CHECK
            # =========================
            echo "🔍 Checking backend with retries..."
            BACKEND_OK=0
            for attempt in 1 2 3 4 5; do
              if curl --max-time 10 -fsS http://127.0.0.1:5000/api/health > /dev/null; then
                BACKEND_OK=1
                echo "✅ Backend healthy"
                break
              fi
              echo "⏳ Backend not ready (attempt ${attempt}/5), retrying..."
              sleep 5
            done

            if [ "$BACKEND_OK" -ne 1 ]; then
              echo "⚠️ Backend health check failed after retries."
              pm2 logs backend --lines 50 --nostream || true
            fi

            echo "🌐 Checking live site..."
            sleep 5

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://nouveauz.com || echo "000")

            if [[ ! "$STATUS" =~ ^(2|3) ]]; then
              echo "❌ Site down (HTTP $STATUS)"
              exit 1
            fi

            echo "✅ Deployment Successful!"
