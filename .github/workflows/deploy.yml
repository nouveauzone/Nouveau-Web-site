name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3. Install frontend dependencies (safe mode)
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      # 4. Build frontend (FIX ESLINT ERROR)
      - name: Build Frontend
        working-directory: frontend
        run: |
          echo "REACT_APP_API_URL=http://13.201.9.17/api" > .env
          CI=false npm run build

      # 5. Upload build to EC2
      - name: Upload build to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "frontend/build/*"
          target: "/home/ubuntu/build-temp"

      # 6. Deploy on EC2
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            cd /home/ubuntu/Nouveau-Web-site-main

            echo "📥 Pull latest code"
            git pull origin main

            # Fix permissions
            sudo chown -R ubuntu:ubuntu /home/ubuntu/Nouveau-Web-site-main

            # -------------------------
            # Backend setup
            # -------------------------
            cd backend

            if [ ! -d "node_modules" ]; then
              npm install --production --no-audit --no-fund
            fi

            pm2 restart nouveau-backend || pm2 start server.js --name "nouveau-backend"
            pm2 save

            # -------------------------
            # Frontend deploy
            # -------------------------
            sudo rm -rf /var/www/nouveau/*
            sudo cp -r /home/ubuntu/build-temp/frontend/build/* /var/www/nouveau/

            sudo chown -R www-data:www-data /var/www/nouveau

            # Restart nginx
            sudo systemctl restart nginx

            echo "✅ Deployment complete!"
