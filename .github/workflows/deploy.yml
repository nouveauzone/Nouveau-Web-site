name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > key.pem
          chmod 600 key.pem

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'

            set -e

            echo "🚀 Starting Deployment..."

            cd /home/ubuntu/Nouveau-Web-site || exit 1

            # Sync repo
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            # Fix permissions
            sudo chown -R ubuntu:ubuntu /home/ubuntu/Nouveau-Web-site

            # =========================
            # 📦 BACKEND
            # =========================
            cd backend
            npm install --production

            # IMPORTANT: no delete, only restart
            pm2 restart backend || pm2 start server.js --name backend
            pm2 save

            # =========================
            # 🎨 FRONTEND
            # =========================
            cd ../frontend
            npm ci
            npm run build

            if [ ! -f build/index.html ]; then
              echo "❌ Frontend build missing build/index.html"
              exit 1
            fi

            # =========================
            # 🔄 NGINX
            # =========================
            echo "📁 Updating Nginx files..."

            BUILD_TMP="/tmp/nouveau-build-$(date +%s)"
            sudo mkdir -p "$BUILD_TMP"
            sudo cp -r build/. "$BUILD_TMP/"

            # Validate nginx config before touching live content
            sudo nginx -t

            # Atomic-ish deploy: backup existing content then replace
            sudo mkdir -p /var/www/html
            if [ -d /var/www/html ] && [ "$(ls -A /var/www/html 2>/dev/null)" ]; then
              sudo rm -rf /var/www/html_prev
              sudo cp -r /var/www/html /var/www/html_prev
            fi
            sudo rm -rf /var/www/html/*
            sudo cp -r "$BUILD_TMP"/. /var/www/html/
            sudo rm -rf "$BUILD_TMP"

            # =========================
            # 🔄 RESTART NGINX
            # =========================
            echo "🔄 Restarting Nginx..."
            sudo systemctl restart nginx
            sudo systemctl --no-pager --full status nginx | head -n 30

            echo "✅ Deployment Complete!"

          EOF
