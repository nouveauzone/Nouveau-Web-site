name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: frontend
        run: |
          echo "REACT_APP_API_URL=http://13.201.9.17/api" > .env
          npm install
          CI=false npm run build

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            cd /home/ubuntu/Nouveau-Web-site-main
            git pull origin main

            # Fix permissions
            sudo chown -R ubuntu:ubuntu /home/ubuntu/Nouveau-Web-site-main

            # Backend dependencies
            cd /home/ubuntu/Nouveau-Web-site-main/backend
            rm -rf node_modules
            npm install --production

            # Frontend build
            cd /home/ubuntu/Nouveau-Web-site-main/frontend
            rm -rf node_modules
            npm install
            CI=false REACT_APP_API_URL=http://13.201.9.17/api npm run build

            # Copy build to nginx folder
            sudo cp -r build/* /var/www/nouveau/
            sudo chown -R www-data:www-data /var/www/nouveau

            # Restart backend (correct path)
            cd /home/ubuntu/Nouveau-Web-site-main/backend
            pm2 restart nouveau-backend || pm2 start server.js --name "nouveau-backend"
            pm2 save

            # Restart nginx
            sudo systemctl restart nginx

            echo "✅ Deployment complete!"
